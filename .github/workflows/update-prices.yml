name: Update Dashboard Prices

on:
  schedule:
    # Runs at 10 PM UTC Mon–Fri = 5 AM SGT Tue–Sat (after US market close)
    - cron: "0 22 * * 1-5"
  workflow_dispatch:   # allows manual trigger from GitHub Actions tab

permissions:
  contents: write      # needed to push the updated HTML back to repo

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install yfinance

      - name: Run price updater
        run: python scripts/update_prices.py

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gen_portfolio_dashboard.html
          git diff --staged --quiet || (
            git commit -m "chore: update prices $(date -u +\'%Y-%m-%d\')" &&
            git push
          )
